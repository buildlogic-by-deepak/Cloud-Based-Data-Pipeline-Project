name: AWS Data Engineering CI/CD

on:
  push:
    branches:
      - main
      - master

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan

      - name: Install Lambda Dependencies
        working-directory: ingestion/lambda
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package
          cp lambda_function.py package/
          cd package
          zip -r lambda_function.zip .

      - name: Upload Lambda Code
        working-directory: ingestion/lambda/package
        run: |
          aws lambda update-function-code \
            --function-name crypto-data-ingestion \
            --zip-file fileb://lambda_function.zip

      - name: Upload Glue Script
        run: |
          aws s3 cp transformation/glue/glue_job.py \
          s3://deepak-crypto-raw-data-2026-001/scripts/glue_job.py